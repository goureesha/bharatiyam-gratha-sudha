name: bharatiyam_gratha_sudha
description: "ಭಾರತೀಯಂ ಗ್ರಂಥ ಸುಧಾ — Encyclopaedia of Encyclopaedias"
publish_to: 'none'
version: 2.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  provider: ^6.1.1
  shared_preferences: ^2.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
  assets:
    - assets/data/
    - assets/fonts/
  fonts:
    - family: Brhknd
      fonts:
        - asset: assets/fonts/brhknd.ttf
    - family: Brhknde
      fonts:
        - asset: assets/fonts/brhknde.ttf
